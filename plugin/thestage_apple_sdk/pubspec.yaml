name: thestage_apple_sdk
description: Flutter plugin for TheStage Swift SDK on Apple platforms.
version: 0.0.1
homepage: https://example.com/thestage_apple_sdk

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: TheStageFlutterPlugin
      macos:
        pluginClass: TheStageFlutterPlugin
